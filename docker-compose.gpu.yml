services:
  web:
    build: .
    container_name: nutrition-web
    ports:
      - "5001:5001"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:1b
      # Added to let your universal script know it is inside a container
      - RUNNING_IN_DOCKER=true
    depends_on:
      - ollama
    volumes:
      - ./instance:/app/instance

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_storage:
