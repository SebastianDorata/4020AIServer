services:
  web:
    build: .
    container_name: nutrition-web
    ports:
      - "5001:5001"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2:1b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./instance:/app/instance